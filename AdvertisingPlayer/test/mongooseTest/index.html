<!DOCTYPE html>
<html>
<head>
<title>Mongoose 测试</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; }
h1 { color: #333; }
.container { max-width: 600px; }
.form-group { margin-bottom: 20px; }
label { display: block; margin-bottom: 5px; }
input[type='text'] { width: 100%; padding: 8px; }
button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; }
button:hover { background: #0069d9; }
.response { margin-top: 20px; padding: 15px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; }
</style>
</head>
<body>
<div class='container'>
<h1>Mongoose HTTP 服务器测试</h1>
<p>欢迎使用 Mongoose 测试服务器！</p>
<div class='form-group'>
<form method='POST' action='/submit'>
<label for='name'>您的姓名：</label>
<input type='text' id='name' name='name' placeholder='请输入您的姓名'>
<button type='submit'>提交</button>
</form>
</div>
<p>API 端点：</p>
<ul>
<li><a href='/api/hello'>GET /api/hello</a> - 返回 JSON 响应</li>
<li><a href='/api/time'>GET /api/time</a> - 返回当前时间</li>
</ul>
</div>
</body>
</html>
