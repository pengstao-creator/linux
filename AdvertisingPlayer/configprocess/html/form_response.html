<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置提交结果</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f4f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #1f2937;
            padding: 24px;
        }
        .panel {
            max-width: 760px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 28px 34px 30px;
        }
        h1 {
            font-size: 40px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
        }
        .ok {
            font-size: 28px;
            color: #16a34a;
            margin-bottom: 22px;
        }
        .list {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }
        .row {
            display: flex;
            border-bottom: 1px solid #eef2f7;
            min-height: 64px;
        }
        .row:last-child { border-bottom: none; }
        .k {
            width: 190px;
            padding: 16px 18px;
            font-size: 24px;
            font-weight: 600;
            color: #334155;
            background: #f8fafc;
            border-right: 1px solid #eef2f7;
        }
        .v {
            flex: 1;
            padding: 16px 18px;
            font-size: 22px;
            color: #111827;
            word-break: break-all;
        }
        .tips {
            margin-top: 18px;
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: #92400e;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 20px;
        }
        .actions {
            margin-top: 22px;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
        }
        .btn {
            min-width: 126px;
            height: 58px;
            border-radius: 9px;
            font-size: 30px;
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-back {
            background: #f3f4f6;
            color: #374151;
            border-color: #e5e7eb;
        }
        .btn-refresh {
            background: #4b88ff;
            color: #fff;
        }
        @media (max-width: 900px) {
            h1 { font-size: 30px; }
            .ok { font-size: 22px; }
            .k { width: 120px; font-size: 16px; }
            .v { font-size: 16px; }
            .tips { font-size: 14px; }
            .btn { font-size: 20px; min-width: 96px; height: 46px; }
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>配置已提交</h1>
    <div class="ok">后端已接收到表单信息</div>
    <div class="list">
        <div class="row"><div class="k">后端地址</div><div class="v" id="backendUrl">-</div></div>
        <div class="row"><div class="k">MQTT地址</div><div class="v" id="mqttUrl">-</div></div>
        <div class="row"><div class="k">WiFi名称</div><div class="v" id="wifiName">-</div></div>
        <div class="row"><div class="k">WiFi密码</div><div class="v" id="wifiPwd">-</div></div>
        <div class="row"><div class="k">片区</div><div class="v" id="chip">-</div></div>
        <div class="row"><div class="k">详细地址</div><div class="v" id="detailAddr">-</div></div>
    </div>
    <div class="tips">提示：如需修改配置，请返回配置页重新提交。</div>
    <div class="actions">
        <a class="btn btn-back" href="index.html">返回配置页</a>
        <a class="btn btn-refresh" href="form_response.html">刷新页面</a>
    </div>
</div>

<script>
    (function () {
        const raw = sessionStorage.getItem('deviceConfig');
        if (!raw) return;
        try {
            const cfg = JSON.parse(raw);
            const ids = ['backendUrl', 'mqttUrl', 'wifiName', 'wifiPwd', 'chip', 'detailAddr'];
            ids.forEach(function (id) {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = cfg[id] ? cfg[id] : '-';
            });
        } catch (e) {}
    })();
</script>
</body>
</html>
