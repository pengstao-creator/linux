<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置提交结果</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg0: #070b1a;
            --bg1: #0b1b3a;
            --card: rgba(255, 255, 255, 0.08);
            --card2: rgba(255, 255, 255, 0.12);
            --stroke: rgba(255, 255, 255, 0.16);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.68);
            --brand: #7c3aed;
            --brand2: #22d3ee;
            --shadow: 0 18px 60px rgba(0,0,0,0.45);
        }
        body {
            min-height: 100vh;
            background:
                radial-gradient(1200px 600px at 20% 10%, rgba(124, 58, 237, 0.35), transparent 60%),
                radial-gradient(900px 500px at 80% 20%, rgba(34, 211, 238, 0.25), transparent 60%),
                radial-gradient(900px 600px at 55% 90%, rgba(59, 130, 246, 0.18), transparent 60%),
                linear-gradient(180deg, var(--bg0), var(--bg1));
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            padding: 26px;
        }
        .panel {
            max-width: 860px;
            margin: 0 auto;
            background: linear-gradient(180deg, var(--card2), var(--card));
            border: 1px solid var(--stroke);
            border-radius: 18px;
            padding: 28px 34px 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }
        h1 {
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 0.6px;
            background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0.76));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .ok {
            font-size: 26px;
            color: rgba(34, 211, 238, 0.92);
            margin-bottom: 22px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 26px;
            font-weight: 800;
            color: rgba(255,255,255,0.90);
            margin-bottom: 10px;
        }
        .list {
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 12px;
            overflow: hidden;
        }
        .row {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.10);
            min-height: 64px;
        }
        .row:last-child { border-bottom: none; }
        .k {
            width: 190px;
            padding: 16px 18px;
            font-size: 24px;
            font-weight: 600;
            color: rgba(255,255,255,0.78);
            background: rgba(255,255,255,0.06);
            border-right: 1px solid rgba(255,255,255,0.10);
        }
        .v {
            flex: 1;
            padding: 16px 18px;
            font-size: 22px;
            color: rgba(255,255,255,0.92);
            word-break: break-all;
        }
        .tips {
            margin-top: 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            color: rgba(255,255,255,0.78);
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 20px;
        }
        .actions {
            margin-top: 22px;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
        }
        .btn {
            min-width: 126px;
            height: 58px;
            border-radius: 9px;
            font-size: 30px;
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-back {
            background: rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.90);
            border-color: rgba(255,255,255,0.14);
        }
        .btn-refresh {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0.92), rgba(34, 211, 238, 0.85));
            color: #091124;
        }
        @media (max-width: 900px) {
            h1 { font-size: 30px; }
            .ok { font-size: 22px; }
            .section-title { font-size: 18px; }
            .k { width: 120px; font-size: 16px; }
            .v { font-size: 16px; }
            .tips { font-size: 14px; }
            .btn { font-size: 20px; min-width: 96px; height: 46px; }
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>配置已提交</h1>
    <div class="ok">后端已接收到表单信息</div>
    <div class="section">
        <div class="section-title">服务器地址</div>
        <div class="list">
            <div class="row"><div class="k">后端地址</div><div class="v" id="backendUrl">-</div></div>
        </div>
    </div>
    <div class="section">
        <div class="section-title">MQTT</div>
        <div class="list">
            <div class="row"><div class="k">MQTT地址</div><div class="v" id="mqttUrl">-</div></div>
            <div class="row"><div class="k">MQTT账户</div><div class="v" id="mqttUsername">-</div></div>
            <div class="row"><div class="k">MQTT密码</div><div class="v" id="mqttPassword">-</div></div>
            <div class="row"><div class="k">心跳主题</div><div class="v" id="heartbeatTopic">-</div></div>
            <div class="row"><div class="k">命令主题</div><div class="v" id="commandTopic">-</div></div>
            <div class="row"><div class="k">广告主题</div><div class="v" id="advertTopic">-</div></div>
        </div>
    </div>
    <div class="section">
        <div class="section-title">WiFi</div>
        <div class="list">
            <div class="row"><div class="k">WiFi名称</div><div class="v" id="wifiName">-</div></div>
            <div class="row"><div class="k">WiFi密码</div><div class="v" id="wifiPwd">-</div></div>
        </div>
    </div>
    <div class="section">
        <div class="section-title">地址</div>
        <div class="list">
            <div class="row"><div class="k">片区</div><div class="v" id="chip">-</div></div>
            <div class="row"><div class="k">详细地址</div><div class="v" id="detailAddr">-</div></div>
        </div>
    </div>
    <div class="tips">提示：如需修改配置，请返回配置页重新提交。</div>
    <div class="actions">
        <a class="btn btn-back" href="index.html">返回配置页</a>
        <a class="btn btn-refresh" href="form_response.html">刷新页面</a>
    </div>
</div>

<script>
    (function () {
        const raw = sessionStorage.getItem('deviceConfig');
        if (!raw) return;
        try {
            const cfg = JSON.parse(raw);
            const ids = ['backendUrl', 'mqttUrl', 'mqttUsername', 'mqttPassword', 'heartbeatTopic', 'commandTopic', 'advertTopic', 'wifiName', 'wifiPwd', 'chip', 'detailAddr'];
            ids.forEach(function (id) {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = cfg[id] ? cfg[id] : '-';
            });
        } catch (e) {}
    })();
</script>
</body>
</html>
