<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>路由器配置 | 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #101418 0%, #1b212c 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(22, 28, 38, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(72, 187, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(72, 187, 255, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card-header {
            background: rgba(0, 20, 40, 0.7);
            padding: 28px 32px;
            border-bottom: 1px solid rgba(72, 187, 255, 0.3);
        }

        .card-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e0f0ff, #7ac8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .card-header p {
            color: #8e9aaf;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .form-container {
            padding: 32px;
        }

        .input-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b3ceff;
            margin-bottom: 8px;
        }

        input, select {
            background: #0f1219;
            border: 1px solid #2c3545;
            border-radius: 20px;
            padding: 12px 18px;
            font-size: 1rem;
            color: #f0f3fa;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            background: #0b0f17;
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .helper-text {
            font-size: 0.7rem;
            color: #6b7c93;
            margin-top: 6px;
            margin-left: 12px;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(95deg, #1e3c72, #2b4f8c);
            border: none;
            border-radius: 36px;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            background: linear-gradient(95deg, #2b4f8c, #1e6f9f);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        hr {
            border-color: #2c3545;
            margin: 20px 0 8px;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #5f6e84;
            margin-top: 24px;
        }

        @media (max-width: 550px) {
            .card-header { padding: 20px 24px; }
            .form-container { padding: 24px; }
            .row-2col { grid-template-columns: 1fr; gap: 16px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>⚙️ 路由器配置</h1>
        <p>无线网络 · 安全 · 高级设置</p>
    </div>
    <div class="form-container">
        <form id="routerConfigForm">
            <!-- 无线网络 -->
            <div class="input-group">
                <label>📡 无线 SSID (网络名称)</label>
                <input type="text" id="ssid" name="ssid" placeholder="例: MyHome_5G" value="RouterPro_2.4G" required>
                <div class="helper-text">2.4GHz / 5GHz 共用标识</div>
            </div>

            <div class="input-group">
                <label>🔐 无线密码 (WPA2-PSK)</label>
                <input type="password" id="wifiPwd" name="wifiPwd" placeholder="至少8位" value="SecurePass123" required minlength="8">
                <div class="helper-text">最少8个字符，建议字母+数字</div>
            </div>

            <!-- 管理员账户 -->
            <div class="input-group">
                <label>🛡️ 管理员新密码</label>
                <input type="password" id="adminPwd" name="adminPwd" placeholder="用于登录路由器后台" value="Admin@2025" required minlength="6">
            </div>

            <div class="row-2col">
                <div class="input-group">
                    <label>🌐 LAN IP 地址</label>
                    <input type="text" id="lanIp" name="lanIp" placeholder="192.168.1.1" value="192.168.31.1" pattern="^(\d{1,3}\.){3}\d{1,3}$">
                    <div class="helper-text">默认: 192.168.31.1</div>
                </div>
                <div class="input-group">
                    <label>⏱️ 时区</label>
                    <select id="timezone" name="timezone">
                        <option value="Asia/Shanghai">北京时间 (UTC+8)</option>
                        <option value="Asia/Tokyo">东京 (UTC+9)</option>
                        <option value="America/New_York">纽约 (UTC-5)</option>
                        <option value="Europe/London">伦敦 (UTC+0)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>📡 高级特性 (可选)</label>
                <input type="text" id="feature" name="feature" placeholder="例如: QoS, Mesh, VPN" value="智能 QoS">
            </div>

            <button type="submit" class="btn-submit">保存并应用配置 →</button>
            <div class="footer-note">修改后路由器将自动重启生效</div>
        </form>
    </div>
</div>

<script>
    (function() {
        const form = document.getElementById('routerConfigForm');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // 获取表单数据
            const ssid = document.getElementById('ssid').value.trim();
            const wifiPwd = document.getElementById('wifiPwd').value;
            const adminPwd = document.getElementById('adminPwd').value;
            const lanIp = document.getElementById('lanIp').value.trim();
            const timezone = document.getElementById('timezone').value;
            const feature = document.getElementById('feature').value.trim();

            // 简单前端校验
            if (!ssid) {
                alert('请填写无线网络名称 (SSID)');
                return;
            }
            if (wifiPwd.length < 8) {
                alert('无线密码长度不能少于8位');
                return;
            }
            if (adminPwd.length < 6) {
                alert('管理员密码长度至少6位');
                return;
            }
            // IP 地址简单正则校验（如果填写了）
            if (lanIp && !/^(\d{1,3}\.){3}\d{1,3}$/.test(lanIp)) {
                alert('LAN IP 地址格式不正确 (例: 192.168.1.1)');
                return;
            }

            // 存储到 sessionStorage，供成功页面读取
            const configData = {
                ssid: ssid,
                wifiPwd: wifiPwd,
                adminPwd: adminPwd,
                lanIp: lanIp || '192.168.31.1',
                timezone: timezone,
                feature: feature || '未启用'
            };
            sessionStorage.setItem('routerConfig', JSON.stringify(configData));

            // 跳转到成功页面
            window.location.href = 'form_response.html';
        });
    })();
</script>
</body>
</html>
