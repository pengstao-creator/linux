<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备配置</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f4f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #1f2937;
            padding: 24px;
        }
        .panel {
            max-width: 760px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 28px 34px 30px;
        }
        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 18px;
            color: #0f172a;
        }
        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin-bottom: 28px;
        }
        h2 {
            font-size: 42px;
            font-weight: 700;
            margin: 18px 0 18px;
            color: #1e293b;
        }
        .group { margin-bottom: 24px; }
        .label {
            display: block;
            font-size: 38px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #334155;
        }
        .control {
            width: 100%;
            height: 72px;
            border: 1px solid #d9dee7;
            border-radius: 9px;
            font-size: 38px;
            padding: 0 20px;
            color: #111827;
            background: #fff;
            outline: none;
        }
        .control::placeholder { color: #9ca3af; }
        .control:focus {
            border-color: #4c8dff;
            box-shadow: 0 0 0 3px rgba(76, 141, 255, 0.18);
        }
        .actions {
            margin-top: 26px;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
        }
        .btn {
            min-width: 126px;
            height: 62px;
            border-radius: 9px;
            font-size: 34px;
            border: 1px solid transparent;
            cursor: pointer;
        }
        .btn-reset {
            background: #f3f4f6;
            color: #374151;
            border-color: #e5e7eb;
        }
        .btn-submit {
            background: #4b88ff;
            color: #ffffff;
        }
        @media (max-width: 900px) {
            h1, h2 { font-size: 30px; }
            .label, .control { font-size: 22px; }
            .control { height: 52px; }
            .btn { font-size: 22px; height: 48px; min-width: 96px; }
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>设备配置</h1>
    <hr class="divider">
    <form id="deviceConfigForm">
        <h2>配网信息</h2>
        <div class="group">
            <label class="label" for="backendUrl">后端地址</label>
            <input class="control" id="backendUrl" name="backendUrl" placeholder="例如: http://api.example.com" value="http://115.159.78.192:8888" required>
        </div>
        <div class="group">
            <label class="label" for="mqttUrl">MQTT地址</label>
            <input class="control" id="mqttUrl" name="mqttUrl" placeholder="例如: mqtt://broker.example.com:1883" value="http://115.159.78.192:8888" required>
        </div>
        <div class="group">
            <label class="label" for="mqttAccount">MQTT账户</label>
            <input class="control" id="mqttAccount" name="mqttAccount" placeholder="输入MQTT账户" required>
        </div>
        <div class="group">
            <label class="label" for="mqttPassword">MQTT密码</label>
            <input class="control" id="mqttPassword" name="mqttPassword" type="password" placeholder="输入MQTT密码" required>
        </div>
        <div class="group">
            <label class="label" for="wifiName">WiFi名称</label>
            <input class="control" id="wifiName" name="wifiName" placeholder="输入WiFi SSID" value="企鹅王二" required>
        </div>
        <div class="group">
            <label class="label" for="wifiPwd">WiFi密码</label>
            <input class="control" id="wifiPwd" name="wifiPwd" type="password" placeholder="输入WiFi密码" value="12345678" required>
        </div>

        <h2>设备信息</h2>
        <div class="group">
            <label class="label" for="chip">片区</label>
            <select class="control" id="chip" name="chip" required>
                <option value="">请选择片区</option>
                <option value="A区">A区</option>
                <option value="B区" selected>B区</option>
                <option value="C区">C区</option>
            </select>
        </div>
        <div class="group">
            <label class="label" for="detailAddr">详细地址</label>
            <input class="control" id="detailAddr" name="detailAddr" placeholder="输入详细安装地址" value="2343" required>
        </div>

        <div class="actions">
            <button type="reset" class="btn btn-reset">重置</button>
            <button type="submit" class="btn btn-submit">提交配置</button>
        </div>
    </form>
</div>

<script>
    (function () {
        const form = document.getElementById('deviceConfigForm');
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(form);
            const payload = new URLSearchParams(formData);
            const displayData = {};
            formData.forEach((v, k) => { displayData[k] = String(v); });
            const res = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: payload.toString()
            });
            if (!res.ok) {
                alert('提交失败，请稍后重试');
                return;
            }
            sessionStorage.setItem('deviceConfig', JSON.stringify(displayData));
            window.location.href = 'form_response.html';
        });
    })();
</script>
</body>
</html>
